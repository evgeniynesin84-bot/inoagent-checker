<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Чекер списков РФ — поиск по имени</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { font-family: system-ui, sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen p-6">
  <div class="max-w-4xl mx-auto">
    <h1 class="text-3xl font-bold text-center mb-2">Чекер списков РФ</h1>
    <p class="text-center text-gray-600 mb-8">Поиск по имени • Иноагенты и нежелательные организации</p>

    <!-- Кнопки загрузки -->
    <div class="flex flex-wrap gap-3 justify-center mb-8">
      <button onclick="loadFromURL('foreign')" 
              class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-medium">
        🌐 Загрузить иноагентов (fz255)
      </button>
      <button onclick="loadFromURL('undesirable')" 
              class="bg-red-600 hover:bg-red-700 text-white px-6 py-3 rounded-xl font-medium">
        🌐 Загрузить нежелательные организации (fz255)
      </button>
      
      <label class="bg-gray-700 hover:bg-gray-800 text-white px-6 py-3 rounded-xl font-medium cursor-pointer">
        📂 Загрузить свой JSON
        <input type="file" accept=".json" onchange="handleFile(this)" class="hidden">
      </label>
    </div>

    <div id="status" class="mb-8 bg-white rounded-2xl shadow p-4 text-sm"></div>

    <!-- Поиск -->
    <div class="bg-white rounded-3xl shadow p-8">
      <div class="flex gap-3 mb-6">
        <input id="searchInput" type="text" 
               class="flex-1 p-5 rounded-2xl border focus:border-blue-500 text-base"
               placeholder="Введите ФИО или название организации">
        
        <select id="typeFilter" class="p-5 rounded-2xl border">
          <option value="">Все списки</option>
          <option value="иноагент">Только иноагенты</option>
          <option value="нежелательная">Только нежелательные</option>
        </select>
      </div>

      <button onclick="searchName()" 
              class="w-full bg-green-600 hover:bg-green-700 text-white py-5 rounded-2xl text-xl font-semibold">
        🔍 Искать
      </button>

      <div id="searchResults" class="mt-8"></div>
    </div>
  </div>

  <script>
    let DB = [];

    function normalize(str) {
      return str.toLowerCase().replace(/\s+/g, ' ').trim();
    }

    function loadDB() {
      const saved = localStorage.getItem('rfBlacklistDB');
      if (saved) DB = JSON.parse(saved);
      updateStatus();
    }

    function saveDB() {
      localStorage.setItem('rfBlacklistDB', JSON.stringify(DB));
      updateStatus();
    }

    function updateStatus() {
      const agents = DB.filter(i => i.type === 'иноагент').length;
      const und = DB.filter(i => i.type === 'нежелательная').length;
      const last = localStorage.getItem('rfLastUpdate') || '—';
      
      document.getElementById('status').innerHTML = `
        <div class="grid grid-cols-3 gap-4 text-center text-sm">
          <div>Иноагенты: <span class="text-blue-600">${agents}</span></div>
          <div>Нежелательные: <span class="text-red-600">${und}</span></div>
          <div>Обновлено: <span class="text-gray-500">${last}</span></div>
        </div>`;
    }

    async function loadFromURL(type) {
      let url, listType;
      if (type === 'foreign') {
        url = 'https://raw.githubusercontent.com/fz255/foreign-agents/main/registry.json';
        listType = 'иноагент';
      } else if (type === 'undesirable') {
        url = 'https://raw.githubusercontent.com/fz255/undesirable-organizations/main/registry.json';
        listType = 'нежелательная';
      }

      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error();
        const data = await res.json();
        addToDB(data, listType);
      } catch(e) {
        alert('Не удалось загрузить автоматически.\n\nСкачай JSON вручную и используй кнопку "Загрузить свой JSON"');
      }
    }

    function handleFile(input) {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          const type = prompt('Тип списка? (иноагент / нежелательная)', 'иноагент');
          if (type) addToDB(data, type);
          input.value = '';
        } catch(err) {
          alert('Ошибка в JSON-файле');
        }
      };
      reader.readAsText(file);
    }

    function addToDB(data, listType) {
      let count = 0;
      const arr = Array.isArray(data) ? data : [data];
      arr.forEach(item => {
        const name = item.fullName || item.name || item.fio || item.title || '';
        if (!name) return;
        if (!DB.some(i => i.name === name && i.type === listType)) {
          DB.push({ name, type: listType, details: item });
          count++;
        }
      });
      saveDB();
      const time = new Date().toLocaleString('ru-RU');
      localStorage.setItem('rfLastUpdate', time);
      alert(`✅ Загружено ${count} записей (${listType})`);
    }

    function searchName() {
      const query = normalize(document.getElementById('searchInput').value);
      const filter = document.getElementById('typeFilter').value;
      if (!query) return alert('Введите имя или название');

      const results = DB.filter(item => 
        normalize(item.name).includes(query) && (!filter || item.type === filter)
      );

      const div = document.getElementById('searchResults');
      if (!results.length) {
        div.innerHTML = `<p class="text-center text-gray-500 py-12 text-xl">Ничего не найдено</p>`;
        return;
      }

      let html = `<p class="mb-4 font-medium text-lg">Найдено: ${results.length}</p>`;
      results.forEach(r => {
        const d = r.details;
        html += `
          <div class="bg-white border rounded-2xl p-6 mb-4">
            <span class="px-4 py-1 text-xs font-medium rounded-full 
              ${r.type==='иноагент' ? 'bg-blue-100 text-blue-700' : 'bg-red-100 text-red-700'}">
              ${r.type.toUpperCase()}
            </span>
            <h3 class="font-semibold text-2xl mt-3">${r.name}</h3>
            <div class="mt-4 text-sm text-gray-600 space-y-2">
              ${d.dob || d.birth_date ? `<p><strong>Дата рождения:</strong> ${d.dob || d.birth_date}</p>` : ''}
              ${d.dateIn ? `<p><strong>Дата включения:</strong> ${d.dateIn}</p>` : ''}
              ${d.dateOut ? `<p class="text-red-600"><strong>Дата исключения:</strong> ${d.dateOut}</p>` : ''}
              ${d.law ? `<p><strong>Основание:</strong> ${d.law}</p>` : ''}
            </div>
          </div>`;
      });
      div.innerHTML = html;
    }

    // Запуск
    loadDB();
  </script>
</body>
</html>
